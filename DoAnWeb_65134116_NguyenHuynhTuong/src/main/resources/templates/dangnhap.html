<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Cơm Tấm Anh High</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container { max-width: 450px; margin: 80px auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .auth-title { text-align: center; font-size: 24px; font-weight: 700; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #555; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 15px; transition: 0.3s; }
        .form-group input:focus { border-color: #f26b21; }
        .alert-error { background-color: #fce8e6; color: #cc3333; padding: 12px; border-radius: 25px; text-align: center; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background-color: #e6f4ea; color: #137333; padding: 12px; border-radius: 25px; text-align: center; margin-bottom: 20px; font-size: 14px; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-link a { color: #f26b21; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-title">Đăng Nhập Hệ Thống</div>
        
        <div class="alert-success" th:if="${thongBaoThanhCong != null}" th:text="${thongBaoThanhCong}"></div>
        
        <div class="alert-error" th:if="${thongBaoLoi != null}" th:text="${thongBaoLoi}"></div>

        <form th:action="@{/dang-nhap}" method="post">
            <div class="form-group">
                <label>Địa chỉ Email</label>
                <input type="email" name="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="matkhau" placeholder="Nhập mật khẩu" required>
            </div>
            
            <button type="submit" class="btn-main-wide" style="width: 100%; margin: 10px 0 0 0;">ĐĂNG NHẬP</button>
        </form>

        <div class="auth-link">
            Chưa có tài khoản? <a href="/dang-ky">Đăng ký thành viên mới</a>
        </div>
    </div>

</body>
</html>
