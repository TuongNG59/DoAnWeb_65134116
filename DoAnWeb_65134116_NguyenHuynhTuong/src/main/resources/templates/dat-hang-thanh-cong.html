<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Cơm Thành Công - Cơm Tấm Anh High</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .success-container { text-align: center; max-width: 600px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .success-icon { font-size: 70px; color: #2ecc71; margin-bottom: 20px; animation: pop 0.5s ease-out; }
        .success-title { font-size: 26px; font-weight: 700; color: #333; margin-bottom: 15px; }
        .success-text { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-container">
            <div class="success-icon">🎉</div>
            <div class="success-title">ĐẶT ĐƠN CƠM THÀNH CÔNG!</div>
            <p class="success-text">
                Hệ thống Cơm Tấm Anh High đã nhận được đơn hàng của bro. <br>
                Nhà bếp đang bắt đầu nổi lửa nướng sườn xèo xèo rồi nhé! Tài xế sẽ gọi cho cậu trong ít phút tới để giao những đĩa cơm nóng hổi nhất.
            </p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <a href="/trang-chu" class="btn-main" style="text-decoration: none; padding: 12px 25px;">🏠 QUAY LẠI THỰC ĐƠN</a>
            </div>
        </div>
    </div>

</body>
</html>
